# device-test.yml — run the ring's REAL install path on ANY registered fleet
# device, on demand, and (opt-in) report the verdict into a GitHub issue.
#
# Two ways to fire it — both usable by a human OR any agent (Copilot, Claude):
#
#   gh workflow run device-test.yml -R kody-w/rapp-canary \
#     -f device=battlestation -f report_issue=42     # report_issue optional
#
#   …or comment on any issue (collaborators only):   /device-test rappter-one
#
# Reporting is OFF by default: a dispatch with no report_issue posts nothing.
# The issue-comment path always reports back to the thread that asked — that
# is its purpose.
#
# SECURITY: issue_comment runs this file and checks out code from MAIN — never
# from a PR branch — and the command is honored only for OWNER/MEMBER/
# COLLABORATOR comment authors, so outside code and outside users can never
# reach a fleet device. Devices are registered by
# .ring/tools/register_device_runner.sh with labels [self-hosted, <os>, <name>].
#
# The Windows steps mirror windows-device-test.yml (the canary-main auto-gate);
# keep the two in sync. Unix steps mirror preflight's e2e leg minus the
# network black-hole — real devices keep their real network, that's the point.

name: device-test

on:
  workflow_dispatch:
    inputs:
      device:
        description: Runner label of the target device (battlestation, rappter-one, …)
        required: true
        default: battlestation
        type: string
      report_issue:
        description: Issue number to post the verdict into (empty = report nothing)
        required: false
        default: ''
        type: string
  issue_comment:
    types: [created]

permissions:
  contents: read

jobs:
  plan:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (startsWith(github.event.comment.body, '/device-test') &&
       contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association))
    runs-on: ubuntu-latest
    permissions:
      issues: write   # rocket-ack on the triggering comment
    outputs:
      device: ${{ steps.resolve.outputs.device }}
      issue: ${{ steps.resolve.outputs.issue }}
    steps:
      - id: resolve
        env:
          IN_DEVICE: ${{ inputs.device }}
          IN_ISSUE: ${{ inputs.report_issue }}
          COMMENT_BODY: ${{ github.event.comment.body }}
          COMMENT_ISSUE: ${{ github.event.issue.number }}
        run: |
          if [ "$GITHUB_EVENT_NAME" = workflow_dispatch ]; then
            dev="$IN_DEVICE"; issue="$IN_ISSUE"
          else
            dev=$(printf '%s\n' "$COMMENT_BODY" | head -1 | awk '{print $2}')
            issue="$COMMENT_ISSUE"
          fi
          dev=$(printf '%s' "${dev:-battlestation}" | tr -cd 'a-zA-Z0-9_-')
          echo "device=$dev" >> "$GITHUB_OUTPUT"
          echo "issue=$issue" >> "$GITHUB_OUTPUT"
          echo "targeting device '$dev' (report issue: '${issue:-none}')"

      - name: ack the command
        if: github.event_name == 'issue_comment'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh api "repos/$GITHUB_REPOSITORY/issues/comments/${{ github.event.comment.id }}/reactions" -f content=rocket

  test:
    needs: plan
    runs-on:
      - self-hosted
      - ${{ needs.plan.outputs.device }}
    concurrency:
      group: device-${{ needs.plan.outputs.device }}   # one install per physical machine
      cancel-in-progress: false
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      # ── Windows devices ────────────────────────────────────────────────────
      - name: preconditions + sandbox (windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          git --version
          python --version
          $busy = Get-NetTCPConnection -LocalPort 7071 -State Listen -ErrorAction SilentlyContinue
          if ($busy) {
            Write-Host '::error::port 7071 busy on the device (a real brainstem running?). Stop it, then re-run.'
            exit 1
          }
          $sandbox = "$env:RUNNER_TEMP\device-sandbox\home"
          New-Item -ItemType Directory -Force -Path $sandbox | Out-Null
          Add-Content -Path $env:GITHUB_ENV -Value "SANDBOX_HOME=$sandbox"

      - name: run the REAL installer sandboxed (windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          $env:USERPROFILE = $env:SANDBOX_HOME
          $env:HOME = $env:SANDBOX_HOME
          $boot = "iex (Get-Content -Raw -Encoding UTF8 '$PWD\install.ps1')"
          $enc = [Convert]::ToBase64String([Text.Encoding]::Unicode.GetBytes($boot))
          Start-Process cmd -ArgumentList '/c', "powershell -NoProfile -ExecutionPolicy Bypass -EncodedCommand $enc > `"$env:RUNNER_TEMP\install.log`" 2>&1"

      - name: wait for a serving brainstem, then assert (windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          $deadline = (Get-Date).AddMinutes(15)
          $health = $null
          while ((Get-Date) -lt $deadline) {
            Start-Sleep -Seconds 5
            try { $health = Invoke-RestMethod -UseBasicParsing http://localhost:7071/health -TimeoutSec 5; break } catch {}
          }
          if (-not $health) {
            Get-Content "$env:RUNNER_TEMP\install.log" -Tail 60 -ErrorAction SilentlyContinue | Write-Host
            throw 'server never came up'
          }
          $health | ConvertTo-Json -Depth 4 | Write-Host
          $ver = (Get-Content rapp_brainstem\VERSION -Raw).Trim()
          if ($health.status -notin @('ok', 'unauthenticated')) { throw "unexpected health status: $($health.status)" }
          if ($health.version -ne $ver) { throw "server v$($health.version) != candidate v$ver" }
          if (-not ($health.agents -contains 'ContextMemory')) { throw "ContextMemory missing from agents: $($health.agents -join ', ')" }
          Write-Host "health OK: $($health.status) v$($health.version)"
          $idx = Invoke-WebRequest -UseBasicParsing http://localhost:7071/ -TimeoutSec 10
          if ($idx.Content -notmatch 'RAPP Brainstem') { throw 'web UI missing "RAPP Brainstem" marker' }
          Invoke-RestMethod -UseBasicParsing http://localhost:7071/models -TimeoutSec 10 | Out-Null
          try {
            $chat = Invoke-RestMethod -UseBasicParsing -Method Post -ContentType 'application/json' `
              -Body '{"user_input":"device test ping"}' http://localhost:7071/chat -TimeoutSec 180
          } catch [System.Net.WebException] {
            $resp = $_.Exception.Response
            if (-not $resp) { throw }
            $body = (New-Object System.IO.StreamReader($resp.GetResponseStream())).ReadToEnd()
            $chat = $body | ConvertFrom-Json
          }
          if (-not $chat) { throw 'chat returned no parseable JSON' }
          Write-Host ("chat contract OK: " + (($chat.PSObject.Properties.Name | Select-Object -First 3) -join ', '))

      # ── macOS / Linux devices ──────────────────────────────────────────────
      - name: preconditions + sandbox (unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          git --version
          python3 --version
          python3 - <<'EOF'
          import socket
          s = socket.socket()
          try:
              s.bind(("127.0.0.1", 7071))
          except OSError:
              raise SystemExit("port 7071 busy on the device (a real brainstem running?). Stop it, then re-run.")
          s.close()
          EOF
          SANDBOX="$RUNNER_TEMP/device-sandbox/home"
          mkdir -p "$SANDBOX"
          echo "SANDBOX_HOME=$SANDBOX" >> "$GITHUB_ENV"

      - name: run the REAL installer sandboxed (unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -x
          export HOME="$SANDBOX_HOME"
          if [ "$RUNNER_OS" = "macOS" ]; then
            script -q "$RUNNER_TEMP/install.log" bash install.sh &
          else
            script -qec "bash install.sh" "$RUNNER_TEMP/install.log" &
          fi

      - name: wait for a serving brainstem, then assert (unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -uo pipefail
          VER="$(tr -d '[:space:]' < rapp_brainstem/VERSION)"
          for i in $(seq 1 120); do
            sleep 5
            if curl -sf http://localhost:7071/health -o "$RUNNER_TEMP/health.json"; then break; fi
            if [ "$i" = 120 ]; then echo "server never came up"; tail -60 "$RUNNER_TEMP/install.log" 2>/dev/null; exit 1; fi
          done
          cat "$RUNNER_TEMP/health.json"
          python3 - "$RUNNER_TEMP/health.json" "$VER" <<'EOF'
          import json, sys
          d = json.load(open(sys.argv[1]))
          assert d.get("status") in ("ok", "unauthenticated"), d
          assert d.get("version") == sys.argv[2], f'server v{d.get("version")} != candidate v{sys.argv[2]}'
          assert "ContextMemory" in (d.get("agents") or []), d.get("agents")
          print("health OK:", d.get("status"), "v" + d.get("version"))
          EOF
          curl -sf http://localhost:7071/ -o "$RUNNER_TEMP/index.html"
          grep -q "RAPP Brainstem" "$RUNNER_TEMP/index.html"
          curl -sf http://localhost:7071/models >/dev/null
          curl -s -X POST http://localhost:7071/chat -H 'Content-Type: application/json' \
            -d '{"user_input":"device test ping"}' | python3 -c "import json,sys; d=json.load(sys.stdin); print('chat contract OK:', list(d)[:3])"

      # ── Common tail ────────────────────────────────────────────────────────
      - name: collect installer log (windows)
        if: always() && runner.os == 'Windows'
        shell: powershell
        run: |
          Write-Host '-- install.log (tail) --'
          Get-Content "$env:RUNNER_TEMP\install.log" -Tail 100 -ErrorAction SilentlyContinue | Write-Host

      - name: collect installer log (unix)
        if: always() && runner.os != 'Windows'
        shell: bash
        run: |
          echo '-- install.log (tail) --'
          tail -100 "$RUNNER_TEMP/install.log" 2>/dev/null || true

      - name: teardown (windows)
        if: always() && runner.os == 'Windows'
        shell: powershell
        run: |
          if ($env:SANDBOX_HOME) {
            Get-CimInstance Win32_Process |
              Where-Object { $_.CommandLine -and $_.CommandLine -like "*$env:SANDBOX_HOME*" } |
              ForEach-Object {
                Write-Host "killing $($_.ProcessId) $($_.Name)"
                Stop-Process -Id $_.ProcessId -Force -ErrorAction SilentlyContinue
              }
            Start-Sleep -Seconds 2
            Remove-Item -Recurse -Force (Split-Path $env:SANDBOX_HOME) -ErrorAction SilentlyContinue
          }

      - name: teardown (unix)
        if: always() && runner.os != 'Windows'
        shell: bash
        run: |
          if [ -n "${SANDBOX_HOME:-}" ]; then
            pkill -f "$SANDBOX_HOME" 2>/dev/null || true
            sleep 2
            rm -rf "$(dirname "$SANDBOX_HOME")"
          fi

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: device-test-${{ needs.plan.outputs.device }}-${{ github.run_id }}
          path: ${{ runner.temp }}/install.log
          if-no-files-found: ignore

  report:
    needs: [plan, test]
    if: always() && needs.plan.result == 'success' && needs.plan.outputs.issue != ''
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - env:
          GH_TOKEN: ${{ github.token }}
          DEVICE: ${{ needs.plan.outputs.device }}
          ISSUE: ${{ needs.plan.outputs.issue }}
          RESULT: ${{ needs.test.result }}
        run: |
          case "$RESULT" in
            success) ICON="✅" ;;
            cancelled) ICON="⏹️" ;;
            *) ICON="❌" ;;
          esac
          URL="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
          gh issue comment "$ISSUE" -R "$GITHUB_REPOSITORY" --body \
            "$ICON **device-test** on \`$DEVICE\` — **$RESULT** at \`${GITHUB_SHA:0:7}\` · [run log]($URL) · dispatched by @${GITHUB_ACTOR} (installer log attached as artifact \`device-test-$DEVICE-$GITHUB_RUN_ID\`)"
